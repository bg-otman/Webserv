<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>400 Bad Request</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #111827;
            --text: #e5e7eb;
            --muted: #9ca3af;
            --accent: #f59e0b;
            --border: rgba(245, 158, 11, 0.35);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Inter", "Segoe UI", Arial, sans-serif;
            background: radial-gradient(circle at top, #1e293b 0%, var(--bg) 55%);
            color: var(--text);
            padding: 24px;
        }

        .card {
            width: min(640px, 100%);
            background: linear-gradient(180deg, rgba(17, 24, 39, 0.95), rgba(17, 24, 39, 0.88));
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 40px 34px;
            box-shadow: 0 22px 50px rgba(0, 0, 0, 0.35);
            text-align: center;
        }

        .code {
            color: var(--accent);
            font-weight: 800;
            letter-spacing: 1px;
            font-size: clamp(42px, 8vw, 68px);
            line-height: 1;
            margin-bottom: 10px;
        }

        h1 {
            font-size: clamp(24px, 4.3vw, 34px);
            margin-bottom: 12px;
        }

        p {
            color: var(--muted);
            line-height: 1.7;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="code">400</div>
        <h1>Bad Request</h1>
        <p>
            The server could not understand your request because it was malformed
            or missing required data.
        </p>
    </main>
</body>
</html>
